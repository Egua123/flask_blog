{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center">Premier Post</h1>

    <div class="card mt-4">
        <div class="card-body">
            <h3>{{ posts.title }}</h3>
            <p>{{ posts.content }}</p>
            <small class="text-muted">
                By {{ posts.author }} on {{ posts.date_posted }}
            </small>
        </div>
    </div>
</div>
{% endblock %}
